name: Sync Movie Release Dates (KOBIS)

on:
  schedule:
    # 매주 화·금 새벽 4시(KST) = UTC 19:00
    - cron: '0 19 * * 1,4'
  workflow_dispatch: {}  # 수동 실행 가능

jobs:
  sync-movies:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (CGV fallback용)
        run: npx playwright install --with-deps chromium

      - name: Run Movie Sync (KOBIS API + CGV)
        run: node scripts/sync-movies.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KOBIS_API_KEY: ${{ secrets.KOBIS_API_KEY }}

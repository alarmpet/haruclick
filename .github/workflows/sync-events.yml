name: Sync Interest Events (Self Scraper v2)

on:
  schedule:
    # Monday/Thursday 04:00 KST
    - cron: '0 19 * * 0,3'
  workflow_dispatch: {}
  repository_dispatch:
    types:
      - sync_events

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Self Scraper v2
        run: node scripts/scrape-events-v2.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CULTURE_API_KEY: ${{ secrets.CULTURE_API_KEY }}

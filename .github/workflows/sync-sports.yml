name: Sync Sports Data

on:
  schedule:
    # Daily 09:00 KST
    - cron: '0 0 * * *'
  workflow_dispatch:
  repository_dispatch:
    types:
      - sync_sports

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Football Sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/sync-sports-football.mjs

      - name: Run KBO Sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-sports-kbo.mjs

      - name: Run K-League Sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-sports-kleague.mjs

      - name: Run WBC Sync
        if: ${{ hashFiles('scripts/sync-sports-wbc.mjs') != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-sports-wbc.mjs

      - name: Skip WBC Sync
        if: ${{ hashFiles('scripts/sync-sports-wbc.mjs') == '' }}
        run: echo "Skipping WBC sync because the script is not present in this revision."
